<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A little question for you 💌</title>
<style>
  :root{
    --pink:#ff7aa8;
    --pink-deep:#ff4f87;
    --cream:#fff0f5;
    --rose:#ffd6e6;
    --text:#7a3b53;
    --green:#7ed957;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Quicksand","Trebuchet MS","Segoe UI",system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #ffe3ef 0%, transparent 60%),
      radial-gradient(1000px 500px at 0% 110%, #ffe9f3 0%, transparent 55%),
      linear-gradient(160deg,#fff5f9 0%, #ffe4ef 55%, #ffd9ea 100%);
    color:var(--text);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* floating background hearts */
  .bg-hearts{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
  .bg-hearts span{
    position:absolute;bottom:-40px;font-size:22px;opacity:.55;
    animation:rise linear infinite;
    filter:drop-shadow(0 2px 4px rgba(255,79,135,.25));
  }
  @keyframes rise{
    0%{transform:translateY(0) rotate(0deg);opacity:0;}
    10%{opacity:.6;}
    100%{transform:translateY(-115vh) rotate(360deg);opacity:0;}
  }

  .wrap{
    position:relative;z-index:2;
    min-height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:28px 18px;text-align:center;
  }

  .card{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(6px);
    border:2px solid #ffd0e2;
    border-radius:34px;
    padding:34px 30px 40px;
    box-shadow:0 24px 60px rgba(255,79,135,.25), inset 0 0 0 6px rgba(255,255,255,.4);
    max-width:560px;width:100%;
    animation:pop .7s cubic-bezier(.18,.89,.32,1.28) both;
  }
  @keyframes pop{0%{transform:scale(.8);opacity:0;}100%{transform:scale(1);opacity:1;}}

  .dogs{display:flex;justify-content:center;align-items:flex-end;gap:6px;margin-bottom:6px;}
  .dog-big{width:148px;height:auto;animation:bob 3.2s ease-in-out infinite;}
  .dog-small{width:84px;height:auto;animation:bob 3.2s ease-in-out infinite .6s;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-8px) rotate(1deg);}}

  h1{
    font-size:clamp(26px,5vw,38px);
    margin:8px 0 4px;line-height:1.15;color:var(--pink-deep);
    letter-spacing:.3px;
  }
  .sub{font-size:clamp(15px,2.6vw,18px);margin:0 0 24px;color:#a85d76;font-weight:600;}

  .btns{position:relative;display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap;min-height:64px;}

  button{
    font-family:inherit;font-weight:700;cursor:pointer;border:none;
    border-radius:999px;padding:16px 34px;font-size:19px;
    transition:transform .12s ease, box-shadow .2s ease;
  }
  button:active{transform:scale(.96);}

  #yes{
    background:linear-gradient(180deg,#9be86a,#5fd13e);
    color:#1f5d12;box-shadow:0 10px 22px rgba(95,209,62,.45);
  }
  #yes:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 14px 28px rgba(95,209,62,.55);}

  #no{
    background:linear-gradient(180deg,#ffb3cd,#ff7aa8);
    color:#7a1738;box-shadow:0 10px 22px rgba(255,79,135,.4);
    will-change:left,top;z-index:5;
  }

  /* celebration */
  #celebrate{display:none;}
  #celebrate.show{display:block;animation:pop .6s cubic-bezier(.18,.89,.32,1.28) both;}
  #celebrate h1{font-size:clamp(30px,6vw,46px);}
  .confetti{position:fixed;top:-30px;z-index:30;pointer-events:none;font-size:24px;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0;}}

  .foot{margin-top:22px;font-size:13px;color:#c98aa3;font-weight:600;}
</style>
</head>
<body>

<div class="bg-hearts" id="bgHearts"></div>

<div class="wrap">
  <div class="card">

    <!-- THE QUESTION -->
    <div id="question">
      <div class="dogs">
        <!-- big dog holding a heart -->
        <svg class="dog-big" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg" aria-label="cute dog">
          <ellipse cx="100" cy="198" rx="60" ry="9" fill="#e9a8c2" opacity=".4"/>
          <!-- body -->
          <ellipse cx="100" cy="150" rx="54" ry="46" fill="#f6c89a"/>
          <ellipse cx="100" cy="158" rx="34" ry="30" fill="#fbe3c8"/>
          <!-- paws -->
          <ellipse cx="74" cy="188" rx="15" ry="11" fill="#f6c89a"/>
          <ellipse cx="126" cy="188" rx="15" ry="11" fill="#f6c89a"/>
          <!-- head -->
          <circle cx="100" cy="86" r="56" fill="#f6c89a"/>
          <!-- ears -->
          <path d="M48 52 C30 30 42 8 60 22 C70 30 70 54 64 66 Z" fill="#d99a63"/>
          <path d="M152 52 C170 30 158 8 140 22 C130 30 130 54 136 66 Z" fill="#d99a63"/>
          <!-- face patch -->
          <ellipse cx="100" cy="100" rx="34" ry="30" fill="#fff4e6"/>
          <!-- eyes -->
          <circle cx="82" cy="80" r="8.5" fill="#46271a"/>
          <circle cx="118" cy="80" r="8.5" fill="#46271a"/>
          <circle cx="85" cy="77" r="3" fill="#fff"/>
          <circle cx="121" cy="77" r="3" fill="#fff"/>
          <!-- blush -->
          <circle cx="66" cy="98" r="9" fill="#ff9bbd" opacity=".6"/>
          <circle cx="134" cy="98" r="9" fill="#ff9bbd" opacity=".6"/>
          <!-- nose + mouth -->
          <ellipse cx="100" cy="98" rx="7" ry="5" fill="#46271a"/>
          <path d="M100 103 v8 M100 111 c-8 0 -12 -5 -12 -5 M100 111 c8 0 12 -5 12 -5" stroke="#46271a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          <!-- heart held -->
          <path d="M100 150 c-10 -14 -30 -8 -30 6 c0 14 22 24 30 30 c8 -6 30 -16 30 -30 c0 -14 -20 -20 -30 -6 Z" fill="#ff4f87"/>
          <path d="M88 142 c4 -3 9 -2 11 2" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".8"/>
        </svg>

        <!-- small peeking pup -->
        <svg class="dog-small" viewBox="0 0 140 150" xmlns="http://www.w3.org/2000/svg" aria-label="little dog">
          <ellipse cx="70" cy="140" rx="42" ry="7" fill="#e9a8c2" opacity=".4"/>
          <circle cx="70" cy="78" r="46" fill="#d9d2cc"/>
          <path d="M30 60 C16 38 30 24 44 38 C50 46 48 64 44 72 Z" fill="#b7ada6"/>
          <path d="M110 60 C124 38 110 24 96 38 C90 46 92 64 96 72 Z" fill="#b7ada6"/>
          <ellipse cx="70" cy="92" rx="28" ry="24" fill="#f5f1ee"/>
          <circle cx="56" cy="74" r="7" fill="#3a3a3a"/>
          <circle cx="84" cy="74" r="7" fill="#3a3a3a"/>
          <circle cx="58" cy="72" r="2.4" fill="#fff"/>
          <circle cx="86" cy="72" r="2.4" fill="#fff"/>
          <circle cx="46" cy="90" r="7" fill="#ff9bbd" opacity=".55"/>
          <circle cx="94" cy="90" r="7" fill="#ff9bbd" opacity=".55"/>
          <ellipse cx="70" cy="90" rx="5.5" ry="4" fill="#3a3a3a"/>
          <path d="M70 94 v6 M70 100 c-6 0 -9 -4 -9 -4 M70 100 c6 0 9 -4 9 -4" stroke="#3a3a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <h1>Grace, will you go on a date with me? 🥺</h1>
      <p class="sub">pretty please? 💕</p>

      <div class="btns" id="btns">
        <button id="yes">Yes 💖</button>
        <button id="no">No</button>
      </div>
      <div class="foot">(careful with that "no" button… it's a little shy)</div>
    </div>

    <!-- CELEBRATION -->
    <div id="celebrate">
      <div class="dogs">
        <svg class="dog-big" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg" aria-label="happy dog">
          <ellipse cx="100" cy="198" rx="60" ry="9" fill="#e9a8c2" opacity=".4"/>
          <ellipse cx="100" cy="150" rx="54" ry="46" fill="#f6c89a"/>
          <ellipse cx="100" cy="158" rx="34" ry="30" fill="#fbe3c8"/>
          <ellipse cx="70" cy="184" rx="15" ry="11" fill="#f6c89a" transform="rotate(-12 70 184)"/>
          <ellipse cx="130" cy="184" rx="15" ry="11" fill="#f6c89a" transform="rotate(12 130 184)"/>
          <circle cx="100" cy="86" r="56" fill="#f6c89a"/>
          <path d="M48 52 C30 30 42 8 60 22 C70 30 70 54 64 66 Z" fill="#d99a63"/>
          <path d="M152 52 C170 30 158 8 140 22 C130 30 130 54 136 66 Z" fill="#d99a63"/>
          <ellipse cx="100" cy="100" rx="34" ry="30" fill="#fff4e6"/>
          <!-- happy closed eyes -->
          <path d="M73 80 c4 -6 12 -6 16 0" stroke="#46271a" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M111 80 c4 -6 12 -6 16 0" stroke="#46271a" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="64" cy="100" r="10" fill="#ff9bbd" opacity=".7"/>
          <circle cx="136" cy="100" r="10" fill="#ff9bbd" opacity=".7"/>
          <ellipse cx="100" cy="98" rx="7" ry="5" fill="#46271a"/>
          <!-- big smile + tongue -->
          <path d="M84 106 c6 12 26 12 32 0" stroke="#46271a" stroke-width="2.6" fill="none" stroke-linecap="round"/>
          <path d="M96 112 c0 8 8 8 8 0 Z" fill="#ff7a9b"/>
        </svg>
      </div>
      <h1>YAY!! 💞</h1>
      <p class="sub">I knew you'd say yes, Grace 🥰<br>It's officially a date.</p>
      <div class="foot">best decision you'll make all week 😌💘</div>
    </div>

  </div>
</div>

<script>
  /* ---------- background floating hearts ---------- */
  (function(){
    const layer=document.getElementById('bgHearts');
    const icons=['💗','💕','🩷','💞','🌸','💖'];
    for(let i=0;i<26;i++){
      const s=document.createElement('span');
      s.textContent=icons[Math.floor(Math.random()*icons.length)];
      s.style.left=Math.random()*100+'vw';
      s.style.fontSize=(14+Math.random()*26)+'px';
      s.style.animationDuration=(9+Math.random()*12)+'s';
      s.style.animationDelay=(-Math.random()*18)+'s';
      layer.appendChild(s);
    }
  })();

  /* ---------- the shy NO button ---------- */
  const no=document.getElementById('no');
  const yes=document.getElementById('yes');
  const btns=document.getElementById('btns');

  let moved=false;
  let dodges=0;
  const taunts=["No","No?","you sure? 🥺","really??","think again 💔","please? 😭","don't be mean!","one more chance…","catch me first! 🏃‍♀️","just say yes 💕"];

  function placeInline(){
    if(moved) return;
    const r=no.getBoundingClientRect();
    no.dataset.x=r.left; no.dataset.y=r.top;
  }

  function goFixed(){
    const r=no.getBoundingClientRect();
    no.style.position='fixed';
    no.style.margin='0';
    no.style.left=r.left+'px';
    no.style.top=r.top+'px';
    moved=true;
  }

  function moveAway(px,py){
    if(!moved) goFixed();
    const r=no.getBoundingClientRect();
    const cx=r.left+r.width/2;
    const cy=r.top+r.height/2;
    let dx=cx-px, dy=cy-py;
    let dist=Math.hypot(dx,dy)||1;
    if(dx===0&&dy===0){dx=Math.random()-0.5;dy=Math.random()-0.5;dist=Math.hypot(dx,dy);}
    // jump distance grows a touch each dodge for extra chaos
    const jump=130+Math.min(dodges*6,70);
    let nx=cx+(dx/dist)*jump - r.width/2;
    let ny=cy+(dy/dist)*jump - r.height/2;

    const pad=12;
    const maxX=window.innerWidth - r.width - pad;
    const maxY=window.innerHeight - r.height - pad;
    // if pushed off an edge, bounce to a fresh random safe spot
    if(nx<pad||nx>maxX||ny<pad||ny>maxY){
      nx=pad+Math.random()*Math.max(1,maxX-pad);
      ny=pad+Math.random()*Math.max(1,maxY-pad);
    }
    no.style.left=nx+'px';
    no.style.top=ny+'px';

    dodges++;
    no.textContent=taunts[Math.min(dodges,taunts.length-1)];
    // nudge: make YES more tempting
    const grow=Math.min(1+dodges*0.06,1.6);
    yes.style.transform='scale('+grow+')';
  }

  // repel when the cursor gets close
  const THRESHOLD=120;
  window.addEventListener('mousemove',(e)=>{
    const r=no.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    if(Math.hypot(cx-e.clientX,cy-e.clientY)<THRESHOLD){
      moveAway(e.clientX,e.clientY);
    }
  });
  // touch / mobile: dodge on tap-attempt
  no.addEventListener('touchstart',(e)=>{
    e.preventDefault();
    const t=e.touches[0];
    moveAway(t.clientX,t.clientY);
  },{passive:false});
  // and if anyone actually manages to hover/click it, still run away
  no.addEventListener('mouseenter',(e)=>moveAway(e.clientX,e.clientY));
  no.addEventListener('click',(e)=>{e.preventDefault();moveAway(e.clientX,e.clientY);});

  window.addEventListener('resize',placeInline);
  placeInline();

  /* ---------- YES → celebration ---------- */
  yes.addEventListener('click',()=>{
    document.getElementById('question').style.display='none';
    document.getElementById('celebrate').classList.add('show');
    burst();
    // a couple of follow-up bursts
    setTimeout(burst,500);
    setTimeout(burst,1100);
  });

  function burst(){
    const icons=['💖','💕','💗','💞','🩷','🌹','✨','💘'];
    for(let i=0;i<60;i++){
      const c=document.createElement('div');
      c.className='confetti';
      c.textContent=icons[Math.floor(Math.random()*icons.length)];
      c.style.left=Math.random()*100+'vw';
      c.style.fontSize=(16+Math.random()*26)+'px';
      c.style.animationDuration=(2.4+Math.random()*2.6)+'s';
      c.style.animationDelay=(Math.random()*0.4)+'s';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),5200);
    }
  }
</script>
</body>
</html>
